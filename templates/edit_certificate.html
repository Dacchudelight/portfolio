<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Certificate</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_certificate.css') }}">
</head>
<body>

<!-- 🔹 NAVBAR -->
<header class="navbar">
    <h2>✏️ Edit Certificate</h2>

    <div class="nav-buttons">
        <a href="{{ url_for('certificates_page') }}" class="btn">← Back</a>
    </div>
</header>

<!-- 🔹 CONTENT -->
<main class="container">

    <div class="form-card">
        <h3>Update Certificate</h3>

        <form method="POST" action="{{ url_for('edit_certificate', id=cert[0]) }}" enctype="multipart/form-data">

            <label>Certificate Title</label>
            <input type="text" name="title" value="{{ cert[1] }}" required>

            <label>Issuer</label>
            <input type="text" name="issuer" value="{{ cert[2] }}" required>

            <label>Update Image (optional)</label>
            <input type="file" name="image" accept="image/*" onchange="previewImage(event)">

            <!-- 🔹 Current Image (Cloudinary) -->
            {% if cert[3] and cert[3].startswith('http') %}
                <p style="margin-top:10px;">Current Image:</p>
                <img src="{{ cert[3] }}" class="preview-img" style="display:block;">
            {% else %}
                <p style="margin-top:10px; color:red;">No valid image</p>
            {% endif %}

            <!-- 🔹 New Preview -->
            <img id="preview" class="preview-img" style="display:none;">

            <button type="submit" class="btn primary">💾 Update Certificate</button>

        </form>
    </div>

</main>

<!-- 🔹 JS Preview -->
<script>
function previewImage(event) {
    const img = document.getElementById('preview');
    const file = event.target.files[0];

    if (file) {
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
    }
}
</script>

</body>
</html>
