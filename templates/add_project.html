<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_project.css') }}">
</head>
<body>

<div class="form-container">

    <!-- 🔹 TOP RIGHT NAV -->
    <div class="top-bar">
        <div class="nav-buttons">
            <a href="/" class="btn home-btn">🏠 Home</a>
            <a href="/admin" class="btn back-btn">⬅ Back</a>
        </div>
    </div>

    <h2>Add Project</h2>

    <form method="POST" action="{{ url_for('add_project') }}" class="form">

        <input name="title" placeholder="Project Title" required>

        <textarea name="description" placeholder="Project Description" rows="4" required></textarea>

        <input name="tools" placeholder="Tools (e.g., Python, SQL)" required>

        <input name="link" placeholder="GitHub / Live Link" required>

        <button type="submit" class="btn primary">Add Project</button>

    </form>

</div>

</body>
</html>
