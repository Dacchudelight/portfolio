<!DOCTYPE html>
<html>
<head>
    <title>Edit Education</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_education.css') }}">
</head>
<body>

<div class="form-wrapper">
    <div class="form-card">

        <h2>✏️ Edit Education</h2>

        <form method="POST" action="{{ url_for('edit_education', id=edu[0]) }}">

            <div class="form-group">
                <label>Degree</label>
                <input type="text" name="degree" value="{{ edu[1] }}" required>
            </div>

            <div class="form-group">
                <label>Institution</label>
                <input type="text" name="institution" value="{{ edu[2] }}" required>
            </div>

            <div class="form-group">
                <label>Year</label>
                <input type="text" name="year" value="{{ edu[3] }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description">{{ edu[4] }}</textarea>
            </div>

            <button type="submit" class="primary-btn">Update</button>

        </form>

    </div>
</div>

</body>
</html>
