<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Certificate</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_certificate.css') }}">
</head>

<body>

<header class="navbar">
    <h2>🎓 Add Certificate</h2>

    <div class="nav-buttons">
        <a href="/" class="btn home-btn">🏠 Home</a>
        <a href="/certificates" class="btn back-btn">⬅ Back</a>
    </div>
</header>

<main class="container">
    <div class="form-card">
        <h3>Add New Certificate</h3>

        <form id="certForm" method="POST" action="/add_certificate" enctype="multipart/form-data">

            <label>Certificate Title</label>
            <input type="text" name="title" required>

            <label>Issuer</label>
            <input type="text" name="issuer" required>

            <label>Upload Certificate Image</label>
            <input type="file" name="image" accept="image/*" required onchange="previewImage(event)">

            <!-- Preview -->
            <img id="preview" class="preview-img" style="display:none;">

            <button type="submit" class="btn primary" id="submitBtn">
                ➕ Add Certificate
            </button>

        </form>
    </div>
</main>

<script>
function previewImage(event) {
    const img = document.getElementById('preview');
    const file = event.target.files[0];

    if (file) {
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("certForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        // 🔥 LOADING STATE
        btn.classList.add("loading");
        btn.innerHTML = "Uploading... <span class='spinner'></span>";

        fetch("/add_certificate", {
            method: "POST",
            body: formData
        })
        .then(res => {
            if (res.ok) {
                showToast("Certificate added successfully!", "success");

                form.reset();
                document.getElementById('preview').style.display = "none";

                if (res.redirected) {
                    setTimeout(() => {
                        window.location.href = res.url;
                    }, 1200);
                }
            } else {
                showToast("Upload failed!", "error");
            }
        })
        .catch(() => {
            showToast("Server error!", "error");
        })
        .finally(() => {
            // 🔥 REMOVE LOADING STATE
            btn.classList.remove("loading");
            btn.innerHTML = "➕ Add Certificate";
        });
    });
});

function showToast(message, type = "success") {
    const toast = document.createElement("div");
    toast.className = "toast " + type;
    toast.innerText = message;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}
</script>

</body>
</html>
